<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vinhpv99 — Project Index</title>
<meta name="description" content="Bảng điều khiển dẫn tới các project của vinhpv99." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#E7E9E4;       /* sage off-white  */
    --surface:#FFFFFF;     /* card            */
    --ink:#0F2A2A;         /* deep teal ink   */
    --muted:#5B6E6B;       /* muted text      */
    --line:#C9D2CC;        /* hairlines       */
    --teal:#0F766E;        /* structural accent */
    --teal-soft:#0F766E1a; /* teal @ ~10%     */
    --pop:#EA580C;         /* tangerine pop   */
    --ok:#16A34A;
    --warn:#CA8A04;
    --radius:16px;
    --shadow:0 1px 2px #0f2a2a0d, 0 12px 28px -16px #0f2a2a26;
    --shadow-lift:0 2px 6px #0f2a2a14, 0 26px 50px -22px #0f2a2a3d;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    /* faint drafting grid */
    background-image:
      linear-gradient(#0f2a2a08 1px, transparent 1px),
      linear-gradient(90deg, #0f2a2a08 1px, transparent 1px);
    background-size:28px 28px;
    color:var(--ink);
    font-family:"DM Sans", system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:clamp(20px,4vw,56px) clamp(18px,4vw,40px) 64px;}

  /* ---------- header ---------- */
  .eyebrow{
    font-family:"Space Mono", monospace;
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--teal);
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--pop);
    box-shadow:0 0 0 4px #ea580c22;animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{50%{box-shadow:0 0 0 7px #ea580c00;}}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;}
  h1{
    font-family:"Bricolage Grotesque", sans-serif;
    font-weight:800;
    font-size:clamp(40px,8vw,82px);
    line-height:.92;letter-spacing:-.03em;
    margin:.28em 0 .12em;
  }
  h1 .at{color:var(--muted);font-weight:500;}
  .tagline{color:var(--muted);max-width:46ch;font-size:clamp(15px,1.6vw,17px);margin:0;}
  .clock{
    font-family:"Space Mono", monospace;font-size:13px;color:var(--muted);
    text-align:right;white-space:nowrap;line-height:1.7;
  }
  .clock b{color:var(--ink);display:block;font-size:26px;letter-spacing:.02em;}

  /* ---------- controls ---------- */
  .controls{
    display:flex;gap:14px;align-items:center;flex-wrap:wrap;
    margin:36px 0 8px;
  }
  .search{position:relative;flex:1 1 260px;min-width:200px;}
  .search input{
    width:100%;font:inherit;font-size:15px;color:var(--ink);
    padding:13px 16px 13px 42px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:12px;outline:none;transition:border-color .15s, box-shadow .15s;
  }
  .search input::placeholder{color:#9aa8a4;}
  .search input:focus{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft);}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{
    font-family:"Space Mono", monospace;font-size:12px;letter-spacing:.02em;
    padding:9px 14px;border-radius:999px;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);color:var(--muted);
    transition:all .15s;
  }
  .chip:hover{border-color:var(--teal);color:var(--teal);}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff;}
  .count{font-family:"Space Mono", monospace;font-size:12px;color:var(--muted);letter-spacing:.04em;}

  /* ---------- grid ---------- */
  .grid{
    display:grid;gap:18px;margin-top:22px;
    grid-template-columns:repeat(auto-fill, minmax(290px,1fr));
  }
  .card{
    position:relative;display:flex;flex-direction:column;
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:22px 22px 20px;
    text-decoration:none;color:inherit;
    box-shadow:var(--shadow);
    transition:transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s, border-color .22s;
    overflow:hidden;
  }
  /* corner registration tick — the drafting signature */
  .card::before{
    content:"";position:absolute;top:14px;right:14px;width:11px;height:11px;
    border-top:2px solid var(--line);border-right:2px solid var(--line);
    transition:border-color .22s;
  }
  .card:hover, .card:focus-visible{
    transform:translateY(-4px);box-shadow:var(--shadow-lift);
    border-color:var(--teal);outline:none;
  }
  .card:hover::before, .card:focus-visible::before{border-color:var(--pop);}
  .card:focus-visible{box-shadow:var(--shadow-lift),0 0 0 4px var(--teal-soft);}
  .idx{font-family:"Space Mono", monospace;font-size:12px;color:var(--pop);letter-spacing:.1em;}
  .card h2{
    font-family:"Bricolage Grotesque", sans-serif;font-weight:700;
    font-size:22px;letter-spacing:-.01em;margin:8px 0 6px;line-height:1.1;
  }
  .card p{color:var(--muted);font-size:14.5px;margin:0 0 16px;flex:1;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .tag{
    font-family:"Space Mono", monospace;font-size:11px;letter-spacing:.02em;
    color:var(--teal);background:var(--teal-soft);padding:4px 9px;border-radius:6px;
  }
  .foot{display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid var(--line);padding-top:14px;}
  .status{display:flex;align-items:center;gap:7px;font-family:"Space Mono", monospace;
    font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}
  .status i{width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--muted);}
  .status.live i{background:var(--ok);} .status.live{color:var(--ok);}
  .status.wip i{background:var(--warn);} .status.wip{color:var(--warn);}
  .status.archived i{background:#94a3b8;}
  .launch{display:flex;align-items:center;gap:6px;font-weight:500;font-size:14px;color:var(--ink);}
  .launch svg{transition:transform .22s cubic-bezier(.2,.7,.2,1);color:var(--pop);}
  .card:hover .launch svg, .card:focus-visible .launch svg{transform:translate(4px,-4px);}

  .empty{
    grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--muted);
    border:1px dashed var(--line);border-radius:var(--radius);
  }
  .empty b{color:var(--ink);}

  /* ---------- footer ---------- */
  footer{
    margin-top:48px;padding-top:24px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:center;
    font-family:"Space Mono", monospace;font-size:12.5px;color:var(--muted);
  }
  footer a{color:var(--teal);text-decoration:none;}
  footer a:hover{text-decoration:underline;}
  footer .links{display:flex;gap:18px;flex-wrap:wrap;}

  @media (max-width:560px){
    .topbar{flex-direction:column;}
    .clock{text-align:left;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important;scroll-behavior:auto;}
  }
</style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="topbar">
        <div>
          <div class="eyebrow"><span class="dot"></span> Project Index · <span id="total">0</span> mục</div>
          <h1><span class="at">@</span>vinhpv99</h1>
          <p class="tagline">Bảng điều khiển tổng hợp các project. Bấm vào một thẻ để mở, hoặc tìm/lọc theo công nghệ ở bên dưới.</p>
        </div>
        <div class="clock">
          <b id="time">--:--</b>
          <span id="date">—</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <label class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="Tìm project hoặc công nghệ…" aria-label="Tìm kiếm project" autocomplete="off" />
      </label>
      <div class="chips" id="chips" role="group" aria-label="Lọc theo công nghệ"></div>
    </div>
    <div class="count"><span id="shown">0</span> / <span id="all">0</span> hiển thị</div>

    <section class="grid" id="grid" aria-live="polite"></section>

    <footer>
      <span>© <span id="year"></span> vinhpv99 · Hosted on GitHub Pages</span>
      <nav class="links">
        <a href="https://github.com/vinhpv99" target="_blank" rel="noopener">GitHub ↗</a>
        <a href="mailto:you@example.com">Email</a>
      </nav>
    </footer>
  </main>

<script>
/* ===========================================================
   ✏️  SỬA DANH SÁCH PROJECT Ở ĐÂY
   - title:  tên project
   - desc:   mô tả 1 câu
   - url:    link tới project (GitHub Pages, repo, demo…)
   - tags:   mảng công nghệ (dùng để lọc + tìm kiếm)
   - status: "live" | "wip" | "archived"
   =========================================================== */
const PROJECTS = [
  {
    title: "Personal Blog",
    desc: "Blog cá nhân tĩnh, viết bằng Markdown và deploy tự động.",
    url: "https://vinhpv99.github.io/blog",
    tags: ["Web", "Static", "Markdown"],
    status: "live",
  },
  {
    title: "Todo App",
    desc: "Ứng dụng quản lý công việc, lưu dữ liệu ngay trên trình duyệt.",
    url: "https://vinhpv99.github.io/todo-app",
    tags: ["JavaScript", "Web", "App"],
    status: "live",
  },
  {
    title: "Weather Dashboard",
    desc: "Tra cứu thời tiết theo thành phố qua API thời gian thực.",
    url: "https://vinhpv99.github.io/weather",
    tags: ["API", "JavaScript", "Web"],
    status: "wip",
  },
  {
    title: "Portfolio v1",
    desc: "Trang giới thiệu bản thân phiên bản đầu tiên.",
    url: "https://vinhpv99.github.io/portfolio",
    tags: ["Web", "CSS"],
    status: "archived",
  },
  {
    title: "Data Visualizer",
    desc: "Biểu đồ tương tác trực quan hoá dữ liệu từ file CSV.",
    url: "https://vinhpv99.github.io/data-viz",
    tags: ["Python", "Data", "Web"],
    status: "wip",
  },
  {
    title: "API Playground",
    desc: "Sân chơi thử nghiệm các REST API nhỏ phục vụ học tập.",
    url: "https://github.com/vinhpv99",
    tags: ["API", "Backend", "Node"],
    status: "live",
  },
];

const STATUS_LABEL = { live: "Đang chạy", wip: "Đang làm", archived: "Lưu trữ" };

const grid = document.getElementById("grid");
const chipsBox = document.getElementById("chips");
const qInput = document.getElementById("q");
const shownEl = document.getElementById("shown");
const allEl = document.getElementById("all");
const totalEl = document.getElementById("total");

let activeTag = "Tất cả";
let query = "";

// build tag chips
const allTags = ["Tất cả", ...Array.from(new Set(PROJECTS.flatMap(p => p.tags)))];
chipsBox.innerHTML = allTags.map((t, i) =>
  `<button class="chip" data-tag="${t}" aria-pressed="${i===0}">${t}</button>`
).join("");

chipsBox.addEventListener("click", e => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  activeTag = btn.dataset.tag;
  chipsBox.querySelectorAll(".chip").forEach(c =>
    c.setAttribute("aria-pressed", c.dataset.tag === activeTag));
  render();
});

qInput.addEventListener("input", () => { query = qInput.value.trim().toLowerCase(); render(); });

function escapeHtml(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function cardHtml(p, i){
  const num = String(i + 1).padStart(2, "0");
  const tags = p.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");
  return `<a class="card" href="${encodeURI(p.url)}" target="_blank" rel="noopener" aria-label="Mở ${escapeHtml(p.title)}">
    <span class="idx">${num}</span>
    <h2>${escapeHtml(p.title)}</h2>
    <p>${escapeHtml(p.desc)}</p>
    <div class="tags">${tags}</div>
    <div class="foot">
      <span class="status ${p.status}"><i></i>${STATUS_LABEL[p.status] || p.status}</span>
      <span class="launch">Mở
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>
      </span>
    </div>
  </a>`;
}

function render(){
  const list = PROJECTS.filter(p => {
    const tagOk = activeTag === "Tất cả" || p.tags.includes(activeTag);
    const hay = (p.title + " " + p.desc + " " + p.tags.join(" ")).toLowerCase();
    const qOk = !query || hay.includes(query);
    return tagOk && qOk;
  });

  grid.innerHTML = list.length
    ? list.map(cardHtml).join("")
    : `<div class="empty">Không có project nào khớp với <b>“${escapeHtml(qInput.value)}”</b>.<br/>Thử từ khoá khác hoặc chọn lại bộ lọc.</div>`;

  shownEl.textContent = list.length;
}

allEl.textContent = totalEl.textContent = PROJECTS.length;
render();

// live clock
function tick(){
  const now = new Date();
  document.getElementById("time").textContent =
    now.toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("date").textContent =
    now.toLocaleDateString("vi-VN", { weekday: "short", day: "2-digit", month: "2-digit", year: "numeric" });
}
tick(); setInterval(tick, 30000);
document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
